# 目标公司清单（用于轮询 ATS 公开职位接口）
#
# 每一项字段：
#   name:  公司名称（仅用于展示）
#   ats:   greenhouse | lever | ashby | none
#          （none 表示该公司未使用这三种 ATS（多为 Workday / Taleo / SmartRecruiters /
#           Jobvite / UltiPro / Oracle Cloud 等自建或第三方系统），没有公开匿名 JSON
#           接口，程序会跳过该公司，仅作记录，可自行去官网手动查看）
#   token: 对应 ATS 的 board token / slug。ats 为 none 时留空。
#   legal_name: 该公司在美国政府签证担保披露数据（DOL LCA/H-1B）里登记用的法律实体名，
#               仅当它跟品牌名差别很大时才需要填（比如 SpaceX 的法律实体名是
#               "Space Exploration Technologies Corp"）。用于 sponsorship_data.py
#               做历史签证担保记录匹配，不填就用 name 直接匹配（品牌名=法律实体名的
#               公司，比如 Formlabs、Markforged，通常不需要填这个字段）。
#   note:  备注（可选）
#
# 如何验证/更新 token：
#   - Greenhouse: 打开公司招聘页，URL 形如 https://job-boards.greenhouse.io/<token>/jobs/...
#     （旧域名 boards.greenhouse.io/<token> 也可能仍在用）
#     或直接访问 https://boards-api.greenhouse.io/v1/boards/<token>/jobs 看是否返回 JSON
#   - Lever:      招聘页 URL 形如 https://jobs.lever.co/<token>
#     或访问 https://api.lever.co/v0/postings/<token>?mode=json
#   - Ashby:      招聘页 URL 形如 https://jobs.ashbyhq.com/<token>
#     或访问 https://api.ashbyhq.com/posting-api/job-board/<token>
#   找到后把 token 填进来即可，不需要改代码。
#
# 以下 token 已通过搜索引擎结果中出现的具体职位链接核实（而非仅猜测公司名），
# 但本环境无法直接发起 HTTP 请求验证接口返回，建议首次使用前按 README
# 「验证公司 ATS token」一节自行核对一次。

companies:
  # --- Additive Manufacturing 设备/材料 ---
  - name: "Stratasys"
    ats: "none"
    token: null
    note: "使用自建/Avature 类招聘门户 careers.stratasys.com，无公开 JSON 接口"
